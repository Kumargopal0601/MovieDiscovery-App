services:
  - type: web
    name: movieverse
    runtime: node
    buildCommand: npm run render-build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: REACT_APP_TMDB_API_KEY
        sync: false
      - key: TMDB_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: REACT_APP_RAZORPAY_KEY_ID
        sync: false
